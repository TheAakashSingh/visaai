version: '3.9'

services:
  mongodb:
    image: mongo:7
    container_name: visaai_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: visaai_secret_2024
      MONGO_INITDB_DATABASE: visaai
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: visaai_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass visaai_redis_2024

  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: visaai_ai
    restart: unless-stopped
    env_file:
    - .env 
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/google-creds.json
      - REDIS_URL=redis://:visaai_redis_2024@redis:6379
    depends_on:
      - redis
    volumes:
      - ./ai-service:/app
      - ./google-credentials.json:/app/google-creds.json

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: visaai_backend
    restart: unless-stopped
    env_file:
    - .env 
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - MONGODB_URI=mongodb://admin:visaai_secret_2024@mongodb:27017/visaai?authSource=admin
      - REDIS_URL=redis://:visaai_redis_2024@redis:6379
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - TWILIO_ACCOUNT_SID=${TWILIO_ACCOUNT_SID}
      - TWILIO_AUTH_TOKEN=${TWILIO_AUTH_TOKEN}
      - TWILIO_PHONE_NUMBER=${TWILIO_PHONE_NUMBER}
      - WHATSAPP_TOKEN=${WHATSAPP_TOKEN}
      - WHATSAPP_PHONE_ID=${WHATSAPP_PHONE_ID}
      - WHATSAPP_VERIFY_TOKEN=${WHATSAPP_VERIFY_TOKEN}
      - ZOHO_CLIENT_ID=${ZOHO_CLIENT_ID}
      - ZOHO_CLIENT_SECRET=${ZOHO_CLIENT_SECRET}
    depends_on:
      - mongodb
      - redis
      - ai-service

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: visaai_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: visaai_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
      - ai-service

volumes:
  mongo_data:
